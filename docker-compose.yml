services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dalizai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  rag-service:
    build:
      context: .
      dockerfile: apps/rag_service/Dockerfile
    profiles: ["app"]
    env_file:
      - .env
    ports:
      - "8100:8100"
    environment:
      QDRANT_URL: http://qdrant:6333
      RAG_METADATA_DB_URL: sqlite:////app/data/rag_service.db
    volumes:
      - rag_service_data:/app/data
    depends_on:
      - qdrant
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=3).read()
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Optional local model service placeholder. First version defaults to DashScope cloud API.
  model-service:
    build:
      context: .
      dockerfile: apps/model_service/Dockerfile
    profiles: ["model"]
    env_file:
      - .env
    ports:
      - "8200:8200"
    volumes:
      - ./models:/models

volumes:
  qdrant_storage:
  rag_service_data:
